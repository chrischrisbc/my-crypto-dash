<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Crypto Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-8 text-blue-400">Crypto Analytics Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="card text-center">
            <h2 class="text-gray-400 uppercase text-sm font-bold">Bitcoin Price (USD)</h2>
            <div id="btc-price" class="text-4xl font-mono mt-2">Loading...</div>
        </div>

        <div class="card text-center">
            <h2 class="text-gray-400 uppercase text-sm font-bold">Market Bias</h2>
            <div class="text-3xl text-green-400 mt-2">BULLISH</div>
        </div>
    </div>

    <script>
        async function fetchPrice() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
            } catch (error) {
                document.getElementById('btc-price').innerText = "Error loading";
            }
        }
        // Update price every 30 seconds
        fetchPrice();
        setInterval(fetchPrice, 30000);
    </script>
</body>
</html>
