<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Crypto & Equity Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid #334155; height: 100%; }
        .sub-box { background: #0f172a; border-radius: 6px; padding: 8px; margin-top: 8px; border: 1px solid #1e293b; font-size: 0.75rem; color: #94a3b8; }
        .section-title { border-left: 4px solid #3b82f6; padding-left: 10px; margin-bottom: 20px; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-4xl font-extrabold mb-10 text-white">Market Intelligence</h1>

    <div class="mb-12">
        <h2 class="section-title">Cryptocurrency</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <p class="text-xs text-gray-400">Bitcoin (BTC)</p>
                <div id="price-bitcoin" class="text-3xl font-mono mt-1 text-orange-400">Loading...</div>
            </div>
            <div class="card">
                <p class="text-xs text-gray-400">Hyperliquid (HYPE)</p>
                <div id="price-hyperliquid" class="text-3xl font-mono mt-1 text-blue-400">Loading...</div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="section-title">Equities</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <p class="text-xs text-gray-400">S&P 500 (SPY)</p>
                <div id="price-SPY" class="text-3xl font-mono mt-1">Loading...</div>
            </div>
            <div class="card">
                <p class="text-xs text-gray-400">Gold (GLD)</p>
                <div id="price-GLD" class="text-3xl font-mono mt-1 text-yellow-500">Loading...</div>
            </div>
        </div>
    </div>

    <div class="mb-12">
        <h2 class="section-title">CryptoChase Picks</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            
            <script>
                const picks = ['SNDK', 'MU', 'TSLA', 'NVDA', 'GOOG'];
                picks.forEach(ticker => {
                    document.write(`
                        <div class="card">
                            <p class="text-xs font-bold text-blue-400">${ticker}</p>
                            <div id="price-${ticker}" class="text-2xl font-mono mt-1 mb-4">...</div>
                            
                            <div class="flex flex-col gap-2">
                                <div class="sub-box">Entry Price: <span class="text-white">--</span></div>
                                <div class="sub-box">Entered: <span class="text-red-400">No</span></div>
                                <div class="sub-box">PNL: <span class="text-white">0.00%</span></div>
                            </div>
                        </div>
                    `);
                });
            </script>
            
        </div>
    </div>

    <script>
        // Use your API key here
        const STOCK_API_KEY = '9dYibo5d8EyDobkghUN87RxfgBZyzJTX';

        async function fetchAllData() {
            // Fetch Crypto
            try {
                const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,hyperliquid&vs_currencies=usd');
                const cryptoData = await cryptoRes.json();
                document.getElementById('price-bitcoin').innerText = '$' + cryptoData.bitcoin.usd.toLocaleString();
                document.getElementById('price-hyperliquid').innerText = '$' + cryptoData.hyperliquid.usd.toLocaleString();
            } catch (e) { console.error("Crypto error", e); }

            // Fetch Stocks & Gold
            try {
                const symbols = 'SPY,GLD,SNDK,MU,TSLA,NVDA,GOOG';
                const stockRes = await fetch(`https://financialmodelingprep.com/api/v3/quote/${symbols}?apikey=${STOCK_API_KEY}`);
                const stockData = await stockRes.json();
                
                stockData.forEach(item => {
                    const element = document.getElementById(`price-${item.symbol}`);
                    if (element) {
                        element.innerText = '$' + item.price.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } catch (e) { console.error("Stock error", e); }
        }

        fetchAllData();
        setInterval(fetchAllData, 60000);
    </script>
</body>
</html>
